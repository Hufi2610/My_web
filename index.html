<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Search Article CS</title>

  <!-- XLSX -->
  <script src="https://cdn.jsdelivr.net/npm/xlsx/dist/xlsx.full.min.js"></script>

  <!-- Barcode Scanner -->
  <script src="https://unpkg.com/html5-qrcode"></script>

  <style>
    * {
      box-sizing: border-box;
    }

    :root {
      --bg: #f5f7fb;
      --card: #ffffff;
      --text: #0f172a;
      --muted: #64748b;
      --primary: #2563eb;
      --primary-dark: #1d4ed8;
      --border: #e5e7eb;
      --hover: #f1f5f9;
    }

    body {
      margin: 0;
      padding: 20px;
      font-family: Arial, sans-serif;
      background: var(--bg);
      color: var(--text);
    }

    .container {
      max-width: 1200px;
      margin: auto;
    }

    /* HEADER */
    h1 {
      display: flex;
      align-items: center;
      gap: 10px;
      font-size: 22px;
      margin-bottom: 14px;
      font-weight: 600;
    }

    .logo {
      width: 36px;
      height: 36px;
      background: var(--primary);
      color: white;
      border-radius: 10px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 18px;
    }

    .badge {
      font-size: 12px;
      padding: 4px 10px;
      border-radius: 999px;
      background: #e5e7eb;
      color: #475569;
    }

    /* CARD */
    .card {
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: 16px;
      padding: 16px;
      box-shadow: 0 6px 20px rgba(0,0,0,0.05);
    }

    /* SEARCH */
    .search-wrap {
      display: flex;
      gap: 10px;
      margin-bottom: 14px;
    }

    #searchInput {
      flex: 1;
      width: 100%;
      padding: 14px 16px;
      border-radius: 10px;
      border: 1px solid var(--border);
      font-size: 15px;
      outline: none;
    }

    #searchInput:focus {
      border-color: var(--primary);
      box-shadow: 0 0 0 3px rgba(37,99,235,0.15);
    }

    /* SCAN BUTTON */
    .scan-btn {
      border: none;
      background: var(--primary);
      color: white;
      border-radius: 10px;
      min-width: 56px;
      font-size: 22px;
      cursor: pointer;
      box-shadow: 0 5px 15px rgba(37,99,235,0.25);
    }

    .scan-btn:hover {
      background: var(--primary-dark);
    }

    /* TABLE */
    .table-container {
      overflow: auto;
      border-radius: 10px;
      border: 1px solid var(--border);
      background: white;
    }

    table {
      width: 100%;
      border-collapse: collapse;
      min-width: 700px;
    }

    th, td {
      padding: 12px 14px;
      border-bottom: 1px solid var(--border);
      text-align: left;
      white-space: nowrap;
      font-size: 14px;
    }

    th {
      position: sticky;
      top: 0;
      z-index: 5;
      color: white;
      background: linear-gradient(
        135deg,
        var(--primary),
        var(--primary-dark)
      );
      box-shadow: 0 2px 8px rgba(0,0,0,0.15);
    }

    tr:nth-child(even) td {
      background: #fafafa;
    }

    tr:hover td {
      background: var(--hover);
    }

    /* FLOAT BUTTON */
    .fab {
      position: fixed;
      right: 20px;
      bottom: 20px;
      width: 56px;
      height: 56px;
      border-radius: 50%;
      background: var(--primary);
      color: white;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 22px;
      cursor: pointer;
      z-index: 1000;
      box-shadow: 0 10px 25px rgba(0,0,0,0.2);
    }

    /* MENU */
    .menu {
      position: fixed;
      right: 20px;
      bottom: 85px;
      display: none;
      flex-direction: column;
      gap: 10px;
      z-index: 1000;
    }

    .menu a {
      background: white;
      border: 1px solid var(--border);
      border-radius: 10px;
      padding: 10px 14px;
      text-decoration: none;
      color: var(--text);
      font-size: 14px;
      white-space: nowrap;
      box-shadow: 0 5px 15px rgba(0,0,0,0.1);
    }

    .menu a:hover {
      background: var(--hover);
    }

    /* OVERLAY */
    .overlay {
      position: fixed;
      inset: 0;
      display: none;
      background: transparent;
      z-index: 999;
    }

    /* SCANNER */
    .scanner-modal {
      position: fixed;
      inset: 0;
      background: rgba(0,0,0,0.75);
      display: none;
      align-items: center;
      justify-content: center;
      z-index: 2000;
      padding: 20px;
    }

    .scanner-box {
      width: 100%;
      max-width: 420px;
      background: white;
      border-radius: 16px;
      padding: 16px;
    }

    .scanner-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 12px;
      font-weight: 600;
    }

    .close-scanner {
      border: none;
      background: #ef4444;
      color: white;
      border-radius: 8px;
      padding: 8px 12px;
      cursor: pointer;
    }

    #reader {
      width: 100%;
    }

    /* MOBILE */
    @media (max-width: 768px) {

      body {
        padding: 12px;
      }

      h1 {
        font-size: 18px;
      }

      th, td {
        font-size: 12px;
        padding: 10px;
      }

      table {
        min-width: 100%;
      }

      .scan-btn {
        min-width: 50px;
      }
    }
  </style>
</head>

<body>

<div class="container">

  <h1>
    <div class="logo">🔍</div>
    Search Article CS
    <span class="badge">Excel Lookup</span>
  </h1>

  <div class="card">

    <!-- SEARCH -->
    <div class="search-wrap">

      <input
        type="text"
        id="searchInput"
        placeholder="Tìm theo mã hàng hoặc diễn giải..."
      />

      <button class="scan-btn" onclick="openScanner()">
        📷
      </button>

    </div>

    <!-- TABLE -->
    <div class="table-container">
      <table id="excelTable"></table>
    </div>

  </div>
</div>

<!-- FLOAT BUTTON -->
<div class="fab" onclick="toggleMenu(event)">
  ⚙️
</div>

<!-- OVERLAY -->
<div
  class="overlay"
  id="overlay"
  onclick="closeMenu()">
</div>

<!-- MENU -->
<div class="menu" id="menu">

  <a
    href="https://hufi2610.github.io/My_web_3/"
    target="_blank">
    🔳 QR / Barcode Tool
  </a>

  <a
    href="https://quiet-bonus-9e7a.locphien-to.workers.dev/"
    target="_blank">
    📘 Hướng dẫn RF
  </a>

  <a
    href="https://ebill.mmvietnam.com/article_check.html?zarsrc=30&utm_source=zalo&utm_medium=zalo&utm_campaign=zalo&gidzl=LbBkOgp_SsPUJEjde-DmPrrExcYuv2KwH1kqFxUmBczCJkOulkfsRH0MxJtewIPeHaovEp3BdQasgVjmOW"
    target="_blank">
    ❌ Không thể check code
  </a>

</div>

<!-- SCANNER -->
<div class="scanner-modal" id="scannerModal">

  <div class="scanner-box">

    <div class="scanner-header">

      <span>📷 Quét Barcode / QR</span>

      <button
        class="close-scanner"
        onclick="closeScanner()">
        Đóng
      </button>

    </div>

    <div id="reader"></div>

  </div>

</div>

<script>

  // ===== EXCEL LOGIC =====
  let originalData = [];

  async function loadExcel() {

    try {

      const res = await fetch('./Data.xlsx');

      const buffer = await res.arrayBuffer();

      const wb = XLSX.read(buffer, {
        type: 'array'
      });

      const sheet = wb.Sheets['Data'];

      const data = XLSX.utils.sheet_to_json(sheet, {
        header: 1,
        defval: ''
      });

      originalData = data;

      renderTable(data);

      document
        .getElementById('searchInput')
        .addEventListener('input', e => {

          filterTable(e.target.value);

        });

    } catch (err) {

      alert(err.message);

    }
  }

  function filterTable(keyword) {

    const k = keyword.toLowerCase();

    const filtered = originalData.filter((row, i) => {

      if (i === 0) return true;

      return row.some(c =>
        String(c).toLowerCase().includes(k)
      );

    });

    renderTable(filtered);
  }

  function renderTable(data) {

    const table = document.getElementById('excelTable');

    if (!data.length) {

      table.innerHTML =
        '<tr><td>Không có dữ liệu</td></tr>';

      return;
    }

    let html = '<thead><tr>';

    data[0].forEach(c => {

      html += `<th>${c}</th>`;

    });

    html += '</tr></thead><tbody>';

    for (let i = 1; i < data.length; i++) {

      html += '<tr>';

      data[i].forEach(c => {

        html += `<td>${c}</td>`;

      });

      html += '</tr>';
    }

    html += '</tbody>';

    table.innerHTML = html;
  }

  loadExcel();

  // ===== FLOAT MENU =====
  function toggleMenu(e) {

    e.stopPropagation();

    const menu = document.getElementById('menu');
    const overlay = document.getElementById('overlay');

    const open = menu.style.display === 'flex';

    if (open) {

      closeMenu();

    } else {

      menu.style.display = 'flex';
      overlay.style.display = 'block';
    }
  }

  function closeMenu() {

    document.getElementById('menu').style.display = 'none';

    document.getElementById('overlay').style.display = 'none';
  }

  document.addEventListener('click', function(e) {

    const menu = document.getElementById('menu');

    const fab = document.querySelector('.fab');

    if (menu.style.display === 'flex') {

      if (
        !menu.contains(e.target) &&
        !fab.contains(e.target)
      ) {

        closeMenu();
      }
    }
  });

  // ===== SCANNER =====
  let html5QrCode;
  let scanning = false;

  async function openScanner() {

    if (scanning) return;

    document
      .getElementById('scannerModal')
      .style.display = 'flex';

    html5QrCode = new Html5Qrcode("reader");

    try {

      scanning = true;

      await html5QrCode.start(

        { facingMode: "environment" },

        {
          fps: 10,
          qrbox: 250
        },

        async (decodedText) => {

          if (!scanning) return;

          scanning = false;

          // GÁN SEARCH
          const searchInput =
            document.getElementById('searchInput');

          searchInput.value = decodedText;

          // GIỮ NGUYÊN LOGIC SEARCH
          filterTable(decodedText);

          // ĐÓNG CAMERA
          await closeScanner();
        },

        (errorMessage) => {
          // ignore
        }
      );

    } catch (err) {

      scanning = false;

      alert("Không mở được camera");

      console.error(err);
    }
  }

  async function closeScanner() {

    document
      .getElementById('scannerModal')
      .style.display = 'none';

    try {

      if (html5QrCode) {

        await html5QrCode.stop();

        await html5QrCode.clear();

        html5QrCode = null;
      }

    } catch (e) {}

    scanning = false;
  }

</script>

</body>
</html>
